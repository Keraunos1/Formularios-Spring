<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <link th:href="@{/css/bootstrap/bootstrap.css}" rel="stylesheet" >
</head>
<body>
<div class="card">
  <div class="card-header text-bg-danger">
    AUNTENTICACIÓN
  </div>
  <div class="card-body">
    <form th:object="${loginModel}}" th:action="@{/login}" method="post" >
        <div class="form-floating mb-3">
            <input type="text" class="form-control"
                   id="txtusuario" placeholder="name@example.com" th:field="*{usuario}" >
            <label for="txtusuario">Usuario</label>
        </div>
        <div class="form-floating">
            <input type="password" class="form-control"
                   id="txtpassword" placeholder="Password" th:field="*{password}">
            <label for="txtpassword">Password</label>
        </div>
        <hr><hr/>
        <button type="submit" class="btn btn-primary">Ingresar</button>
    </form>
  </div>
</div>
</body>
</html>
